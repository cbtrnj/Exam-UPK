<!DOCTYPE html>
<html>
<head>
  <title>Login Ujian UPK</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 30px;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }
    img {
      width: 120px;
      margin: 20px 0;
    }
    h2, h3 {
      margin: 5px 0;
    }
    input {
      padding: 8px;
      margin: 10px;
      width: 220px;
    }
    button {
      padding: 8px 15px;
      cursor: pointer;
    }
    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <!-- Header Exambro -->
  <header>Exambro V2</header>

  <!-- Logo sekolah -->
  <img src="https://i.imgur.com/J1mKppg.png" alt="Logo Sekolah">

  <!-- Nama sekolah dan judul ujian -->
  <h2>PKBM Ristek Nusantara Jaya</h2>
  <h3>Ujian Pendidikan Kesetaraan (UPK)</h3>

  <!-- Form login -->
  <input id="username" placeholder="Masukkan Nama">
  <button onclick="login()">Login</button>

  <audio id="blockSound" src="nit-nit.mp3" preload="auto"></audio>

  <!-- Footer kredit -->
  <footer>RNJ-Team.IT</footer>

  <script>
    const backendURL = "https://exam-upk-backend.onrender.com"; // ganti sesuai URL backend

    async function login() {
      let username = document.getElementById("username").value;
      let res = await fetch(`${backendURL}/login`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username})
      });
      let data = await res.json();
      if (data.blocked) {
        alert("Anda terblokir! Hubungi pengawas.");
        document.getElementById("blockSound").play();
        document.body.style.backgroundColor = "red";
      } else if (data.success) {
        localStorage.setItem("user", username);
        window.location.href = "dashboard.html";
      } else {
        alert("Login gagal!");
      }
    }
  </script>
</body>
</html>
