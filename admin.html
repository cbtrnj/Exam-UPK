<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>
  <h2>Panel Admin</h2>
  <p>Masukkan username siswa untuk membuka blokir:</p>
  <input id="username" placeholder="Username siswa">
  <button onclick="unblockUser()">Unblock</button>

  <script>
    async function unblockUser() {
      let username = document.getElementById("username").value;
      let res = await fetch('/unblockUser', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username})
      });
      let data = await res.json();
      if (data.success) {
        alert("Siswa berhasil di-unblock!");
      } else {
        alert("Gagal membuka blokir.");
      }
    }
  </script>
</body>
</html>
