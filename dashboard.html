<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Ujian</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      border-bottom: 3px solid #4facfe;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      margin: 10px;
      padding: 20px;
      width: 280px;
      text-align: center;
    }
    .card h3 {
      margin-bottom: 15px;
      text-shadow: 1px 1px 2px #000;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      background-color: #ff9800;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      transition: 0.3s;
      width: 100%;
    }
    button:hover:enabled {
      background-color: #e68900;
    }
    button:disabled {
      background-color: #777;
      cursor: not-allowed;
    }
    footer {
      text-align: center;
      margin: 20px;
      font-size: 14px;
      color: #eee;
    }
    @media (max-width: 600px) {
      .card {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <header>Exambro V2</header>

  <div class="container">
    <div class="card">
      <h3>Senin</h3>
      <button id="senin" onclick="location.href='math.html'">Matematika</button>
    </div>
    <div class="card">
      <h3>Selasa</h3>
      <button id="selasa" onclick="location.href='general.html?subject=bahasa'">Bahasa Indonesia</button>
    </div>
    <div class="card">
      <h3>Rabu</h3>
      <button id="rabu" onclick="location.href='general.html?subject=ipa'">IPA</button>
    </div>
    <div class="card">
      <h3>Kamis</h3>
      <button id="kamis" onclick="location.href='general.html?subject=ips'">IPS</button>
    </div>
  </div>

  <div style="text-align:center;">
    <button onclick="logout()">Logout</button>
  </div>

  <footer>RNJ-Team.IT</footer>

  <script>
    function logout() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }

    // Kunci otomatis sesuai hari
    const hari = new Date().getDay(); 
    // Minggu=0, Senin=1, Selasa=2, Rabu=3, Kamis=4, Jumat=5, Sabtu=6

    document.getElementById("senin").disabled = (hari !== 1);
    document.getElementById("selasa").disabled = (hari !== 2);
    document.getElementById("rabu").disabled = (hari !== 3);
    document.getElementById("kamis").disabled = (hari !== 4);
  </script>
</body>
</html>
