<!DOCTYPE html>
<html>
<head>
  <title>Login Ujian UPK</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 30px;
      background: linear-gradient(135deg, #4facfe, #00f2fe); /* gradasi biru */
      color: #fff;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 3px solid #4facfe;
    }
    img {
      width: 120px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
    }
    h2, h3 {
      margin: 5px 0;
      text-shadow: 1px 1px 2px #000;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 240px;
      border-radius: 5px;
      border: none;
      outline: none;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
      background-color: #ff9800;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover {
      background-color: #e68900;
    }
    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #eee;
    }
  </style>
</head>
<body>
  <!-- Header Exambro -->
  <header>Exambro V2</header>

  <!-- Logo sekolah -->
  <img src="https://i.imgur.com/J1mKppg.png" alt="Logo Sekolah">

  <!-- Nama sekolah dan judul ujian -->
  <h2>PKBM Ristek Nusantara Jaya</h2>
  <h3>Ujian Pendidikan Kesetaraan (UPK)</h3>

  <!-- Form login -->
  <input id="username" placeholder="Masukkan Nama">
  <button onclick="login()">Login</button>

  <audio id="blockSound" src="nit-nit.mp3" preload="auto"></audio>

  <!-- Footer kredit -->
  <footer>RNJ-Team.IT</footer>

  <script>
    const backendURL = "https://Exam-UPK-dashboard.html"; // ganti sesuai URL backend

    async function login() {
      let username = document.getElementById("username").value;
      let res = await fetch(`${backendURL}/login`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username})
      });
      let data = await res.json();
      if (data.blocked) {
        alert("Anda terblokir! Hubungi pengawas.");
        document.getElementById("blockSound").play();
        document.body.style.backgroundColor = "red";
      } else if (data.success) {
        localStorage.setItem("user", username);
        window.location.href = "dashboard.html";
      } else {
        alert("Login gagal!");
      }
    }
  </script>
</body>
</html>
