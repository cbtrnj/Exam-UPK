<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Ujian</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 30px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 3px solid #4facfe;
    }
    img {
      width: 120px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
    }
    h2, h3 {
      margin: 5px 0;
      text-shadow: 1px 1px 2px #000;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      background-color: #ff9800;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover {
      background-color: #e68900;
    }
    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #eee;
    }
  </style>
</head>
<body>
  <!-- Header Exambro -->
  <header>Exambro V2</header>

  <!-- Logo sekolah -->
  <img src="https://i.imgur.com/J1mKppg.png" alt="Logo Sekolah">

  <!-- Nama sekolah dan judul ujian -->
  <h2>PKBM Ristek Nusantara Jaya</h2>
  <h3>Ujian Pendidikan Kesetaraan (UPK)</h3>

  <!-- Navigasi mapel -->
  <p>Silakan pilih mata pelajaran:</p>
  <button onclick="location.href='math.html'">Matematika</button>
  <button onclick="location.href='general.html?subject=bahasa'">Bahasa Indonesia</button>
  <button onclick="location.href='general.html?subject=ipa'">IPA</button>
  <button onclick="location.href='general.html?subject=ips'">IPS</button>

  <!-- Tombol logout -->
  <br><br>
  <button onclick="logout()">Logout</button>

  <!-- Footer kredit -->
  <footer>RNJ-Team.IT</footer>

  <script>
    function logout() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
